let currentPhase = 'post';

function buildDatasets(phase) {
  const items = DATA[phase];
  const ds = [];
  // group by algorithm
  const byAlgo = {};
  for (const it of items) {
    if (!byAlgo[it.algorithm]) byAlgo[it.algorithm] = [];
    byAlgo[it.algorithm].push(it);
  }
  for (const algo of ALGO_ORDER) {
    const cfgs = byAlgo[algo] || [];
    const hex = COLORS[algo];
    // seeds layer
    const seedPts = [];
    for (const c of cfgs)
      for (const s of c.seeds)
        seedPts.push({x:s[0], y:s[1]});
    ds.push({
      label: algo + ' seeds',
      data: seedPts,
      backgroundColor: hex + '72',
      borderColor: hex + '72',
      pointRadius: 3.5,
      pointHoverRadius: 5,
      showLine: false,
      _algo: algo, _layer: 'seed'
    });
    // centroid layer
    const centPts = cfgs.map(c => ({x:c.centroid[0], y:c.centroid[1], _label:c.label}));
    ds.push({
      label: algo + ' centroids',
      data: centPts,
      backgroundColor: hex,
      borderColor: '#ffffff',
      borderWidth: 1.5,
      pointRadius: 7,
      pointHoverRadius: 9,
      showLine: false,
      _algo: algo, _layer: 'centroid'
    });
  }
  // reference markers
  ds.push({
    label: 'reference',
    data: [
      {x:1000, y:0.0, _label:'standing peak  (return ≈ 1000)'},
      {x:1000, y:1.0, _label:'GOAL: sustained hop  (return ≈ 2000)'}
    ],
    backgroundColor: '#A32D2D',
    borderColor: '#A32D2D',
    borderWidth: 2.5,
    pointRadius: 9,
    pointStyle: 'crossRot',
    showLine: false,
    _layer: 'ref'
  });
  return ds;
}

// quadrant plugin
const quadrantPlugin = {
  id: 'quadrants',
  beforeDraw(chart) {
    const {ctx, chartArea:{left,right,top,bottom}, scales:{x,y}} = chart;
    const xDiv = x.getPixelForValue(700);
    const yDiv = y.getPixelForValue(0.4);
    // background fills
    const zones = [
      {x1:left,x2:xDiv, y1:top,   y2:yDiv,   color:'rgba(29,158,117,0.06)', label:'hopper-faller',    lx:8, ly:14},
      {x1:xDiv,x2:right,y1:top,   y2:yDiv,   color:'rgba(29,158,117,0.14)', label:'sustained hop ★',  lx:-8,ly:14, alignR:true},
      {x1:left,x2:xDiv, y1:yDiv,  y2:bottom, color:'rgba(162,61,45,0.05)',  label:'collapsed',        lx:8, ly:-8},
      {x1:xDiv,x2:right,y1:yDiv,  y2:bottom, color:'rgba(186,117,23,0.07)', label:'stander',          lx:-8,ly:-8, alignR:true},
    ];
    ctx.save();
    for (const z of zones) {
      ctx.fillStyle = z.color;
      ctx.fillRect(z.x1, z.y1, z.x2-z.x1, z.y2-z.y1);
      ctx.fillStyle = 'rgba(136,135,128,0.55)';
      ctx.font = '10px sans-serif';
      ctx.textAlign = z.alignR ? 'right' : 'left';
      ctx.textBaseline = z.ly > 0 ? 'top' : 'bottom';
      const tx = z.alignR ? z.x2 + z.lx : z.x1 + z.lx;
      const ty = z.ly > 0 ? z.y1 + z.ly : z.y2 + z.ly;
      ctx.fillText(z.label, tx, ty);
    }
    // dashed dividers
    ctx.setLineDash([6,4]);
    ctx.strokeStyle = 'rgba(136,135,128,0.30)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(xDiv,top); ctx.lineTo(xDiv,bottom); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(left,yDiv); ctx.lineTo(right,yDiv); ctx.stroke();
    ctx.restore();
  }
};

            if (ds._layer === 'ref') return pt._label;
            if (ds._layer === 'centroid') return pt._label + '  (' + pt.x.toFixed(0) + ' steps, ' + pt.y.toFixed(2) + ' m/s)';
            return pt.x.toFixed(0) + ' steps,  ' + pt.y.toFixed(2) + ' m/s';
          }
        }
      }
    }
  },
  plugins: [quadrantPlugin]
});

// legend
const leg = document.getElementById('legend');
for (const algo of ALGO_ORDER) {
  const name = algo.replace(/_/g, '_');
  leg.innerHTML += '<span style="display:inline-flex;align-items:center;gap:4px;">' +
    '<span style="width:9px;height:9px;border-radius:2px;background:'+COLORS[algo]+';display:inline-block;"></span>' +
    name + '</span>';
}

function switchPhase(phase) {
  currentPhase = phase;
  chart.data.datasets = buildDatasets(phase);
  chart.update();
  document.getElementById('btn-post').style.background = phase==='post' ? 'var(--color-background-secondary,#2a2a2a)' : 'transparent';
  document.getElementById('btn-pre').style.background  = phase==='pre'  ? 'var(--color-background-secondary,#2a2a2a)' : 'transparent';
}
</script>
